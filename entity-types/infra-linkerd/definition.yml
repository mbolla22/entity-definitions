domain: INFRA
type: LINKERD

goldenTags:
  - account
  - k8s.clusterName
  - k8s.namespaceName
  - linkerd.proxy.name

synthesis:
  rules:
    # OpenTelemetry Linkerd Prometheus Receiver (via Prometheus exporter)
    - ruleName: infra_linkerd_prometheus_composite
      compositeIdentifier:
        separator: ":"
        attributes:
          - k8s.cluster.name
          - k8s.namespace.name
          - linkerd.proxy.name
      name: linkerd.proxy.name
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Metric
        # Linkerd metrics start with 'linkerd_' prefix from Prometheus exporter
        - attribute: metricName
          prefix: linkerd_
        - attribute: instrumentation.provider
          value: opentelemetry
        # This filters metrics coming from prometheus receiver
        - attribute: otel.library.name
          value: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver"
        - attribute: k8s.cluster.name
          present: true
        - attribute: linkerd.proxy.name
          present: true
      tags:
        # === LINKERD SPECIFIC ATTRIBUTES ===
        linkerd.proxy.name:
        linkerd.proxy.version:
        linkerd.version:
        
        # === KUBERNETES ATTRIBUTES ===
        k8s.cluster.name:
          entityTagNames: [k8s.clusterName, clusterName]
          ttl: P1D
        k8s.namespace.name:
          entityTagNames: [k8s.namespaceName, namespaceName, namespace]
          ttl: P1D
        k8s.deployment.name:
          entityTagNames: [k8s.deploymentName, deploymentName]
          ttl: P1D
        k8s.pod.name:
          entityTagNames: [k8s.podName, podName]
          ttl: P1D
        k8s.node.name:
          entityTagNames: [k8s.nodeName, nodeName]
          ttl: P1D
        k8s.service.name:
          entityTagName: k8s.serviceName
          ttl: P1D
        
        # === SERVICE DISCOVERY ATTRIBUTES ===
        service.name:
        service.namespace:
        service.version:
        
        # === HOST & INFRASTRUCTURE ATTRIBUTES ===
        host.name:
        host.address:
          entityTagNames: [host.address, endpoint]
        
        # === TELEMETRY & INSTRUMENTATION ===
        otel.library.name:
          entityTagName: instrumentation.name
        telemetry.sdk.name:
          entityTagName: instrumentation.provider
        instrumentation.provider:
        
        # === CLOUD PROVIDER ATTRIBUTES ===
        cloud.provider:
        cloud.platform:
        cloud.account.id:
        cloud.region:
        cloud.availability_zone:
        
        # === AWS SPECIFIC ===
        aws.region:
          entityTagName: aws.region
        
        # === INTEGRATION METADATA ===
        newrelic.integrationName:
          entityTagName: newrelic.integrationName
        newrelic.integrationVersion:
          entityTagName: newrelic.integrationVersion
      prefixedTags:
        label.:
          ttl: P1D
        k8s.label.:
          ttl: P1D
        k8s.annotation.:
          ttl: P1D

    # Native Linkerd OpenTelemetry metrics (if available)
    - ruleName: infra_linkerd_native_otel
      compositeIdentifier:
        separator: ":"
        attributes:
          - k8s.cluster.name
          - k8s.namespace.name
          - service.name
      name: service.name
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: service.name
          present: true
        - attribute: k8s.cluster.name
          present: true
        - attribute: instrumentation.provider
          value: opentelemetry
        # Filter for potential native Linkerd instrumentation
        - attribute: messaging.system
          value: linkerd
      tags:
        # === SERVICE MESH ATTRIBUTES ===
        service.name:
        service.namespace:
        service.version:
        messaging.system:
        
        # === KUBERNETES ATTRIBUTES ===
        k8s.cluster.name:
          entityTagNames: [k8s.clusterName, clusterName]
          ttl: P1D
        k8s.namespace.name:
          entityTagNames: [k8s.namespaceName, namespaceName, namespace]
          ttl: P1D
        k8s.pod.name:
          entityTagNames: [k8s.podName, podName]
          ttl: P1D
        k8s.deployment.name:
          entityTagNames: [k8s.deploymentName, deploymentName]
          ttl: P1D
        
        # === TELEMETRY ATTRIBUTES ===
        otel.library.name:
          entityTagName: instrumentation.name
        telemetry.sdk.name:
          entityTagName: instrumentation.provider
      prefixedTags:
        label.:
          ttl: P1D
        k8s.label.:
          ttl: P1D

    # Kube-state-metrics with Linkerd labels
    - ruleName: infra_linkerd_k8s_metrics
      compositeIdentifier:
        separator: ":"
        attributes:
          - k8s.cluster.name
          - k8s.namespace.name
          - k8s.service.name
      name: k8s.service.name
      encodeIdentifierInGUID: true
      conditions:
        - attribute: metricName
          prefix: kube_service_
        - attribute: k8s.cluster.name
          present: true
        - attribute: k8s.service.label.linkerd_io_proxy_deployment
          present: true
        - attribute: newrelic.source
          value: 'api.metrics.otlp'
        - attribute: instrumentation.provider
          value: opentelemetry
      tags:
        k8s.cluster.name:
          entityTagNames: [k8s.clusterName, clusterName]
          ttl: P1D
        k8s.namespace.name:
          entityTagNames: [k8s.namespaceName, namespaceName]
          ttl: P1D
        k8s.service.name:
          entityTagName: k8s.serviceName
          ttl: P1D
        k8s.service.label.linkerd_io_proxy_deployment:
          entityTagName: linkerd.proxy.deployment
          ttl: P1D
      prefixedTags:
        k8s.label.:
          ttl: P1D

    # OpenTelemetry Logs for Linkerd
    - ruleName: infra_linkerd_logs
      compositeIdentifier:
        separator: ":"
        attributes:
          - k8s.cluster.name
          - k8s.namespace.name
          - service.name
      name: service.name
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Log
        - attribute: newrelic.source
          value: 'api.logs.otlp'
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: k8s.container.name
          value: linkerd-proxy
      tags:
        k8s.cluster.name:
          entityTagNames: [k8s.clusterName]
          ttl: P1D
        k8s.namespace.name:
          entityTagNames: [k8s.namespaceName]
          ttl: P1D
        k8s.container.name:
          entityTagName: k8s.containerName
        service.name:

  tags:
    # === GLOBAL TELEMETRY TAGS ===
    telemetry.sdk.name:
      entityTagName: instrumentation.provider
    telemetry.sdk.language:
      entityTagName: language
    telemetry.sdk.version:

configuration:
  entityExpirationTime: DAILY
  alertable: true

dashboardTemplates:
  # Reference existing Linkerd dashboard
  newRelic:
    template: newrelic_dashboard.json
  # OpenTelemetry specific dashboard
  opentelemetry:
    template: opentelemetry_dashboard.json
  # Prometheus receiver dashboard
  prometheus:
    template: prometheus_dashboard.json

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"